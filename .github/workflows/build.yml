  windows:
    runs-on: windows-2022
    defaults: { run: { shell: cmd } }
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.3
          setup-python: true
          arch: win64_mingw
          aqtversion: '>=3.2.0' # 3.2.0+ required for Qt 6.8+ support; https://github.com/miurahr/aqtinstall/issues/843
      - name: Show toolchain
        shell: bash
        run: |
          ls -lah "$QT_ROOT_DIR/bin/"
          cat $QT_ROOT_DIR/bin/qt-cmake.bat
      - name: Upload aqtinstall log file
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aqtinstall-log-win
          path: aqtinstall.log
          if-no-files-found: error
      - uses: actions/checkout@v4
      - name: Set MINGW64_ROOT
        shell: powershell
        run: |
          (Get-Content "src\CMakeLists.txt") -replace 'set\(MINGW64_ROOT ""', "set(MINGW64_ROOT `"$env:QT_ROOT_DIR`"" | Set-Content "src\CMakeLists.txt"
      - uses: actions/checkout@v4
      - name: Configure
        id: build
        run: |
            "%QT_ROOT_DIR%\bin\qt-cmake.bat" -S "%GITHUB_WORKSPACE%\src" -B "%GITHUB_WORKSPACE%\build" ^
              -DQT_QMAKE_EXECUTABLE:FILEPATH="%QT_ROOT_DIR%\bin\qmake.exe" ^
              -DCMAKE_BUILD_TYPE:STRING=Release ^
              -DCMAKE_PREFIX_PATH:PATH="%QT_ROOT_DIR%" ^
              -DCMAKE_GENERATOR:STRING=Ninja ^
              -G "Ninja"
      - name: Build
        run: |
          "%QT_ROOT_DIR%\bin\qt-cmake.bat" --build "%GITHUB_WORKSPACE%\build"s
      - name: Show directory content
        shell: bash
        run: |
          ls -lah "$GITHUB_WORKSPACE/build"
